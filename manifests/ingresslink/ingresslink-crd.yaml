# ============================================================
# IngressLink CRD Definition
# ------------------------------------------------------------
# This Custom Resource Definition tells Kubernetes about the
# IngressLink resource type. CIS watches for IngressLink
# resources and uses them to create BIG-IP virtual servers
# that point to NGINX IC pods.
#
# NOTE: Newer CIS versions may bundle this CRD automatically.
# Check your CIS version — if the CRD already exists, you
# can skip applying this file.
#
# Verify with: kubectl get crd ingresslinks.cis.f5.com
# ============================================================

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingresslinks.cis.f5.com
spec:
  group: cis.f5.com
  names:
    kind: IngressLink
    listKind: IngressLinkList
    plural: ingresslinks
    singular: ingresslink
    shortNames:
      - il
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                virtualServerAddress:
                  type: string
                  description: "BIG-IP VIP address for this IngressLink"
                host:
                  type: string
                  description: "Optional hostname for the VIP"
                iRules:
                  type: array
                  items:
                    type: string
                  description: "List of BIG-IP iRules to attach"
                partition:
                  type: string
                  description: "BIG-IP partition (default: from CIS args)"
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: "Label selector to find NGINX IC pods/service"
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: VIP
          type: string
          jsonPath: .spec.virtualServerAddress
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
