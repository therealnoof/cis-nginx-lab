# ============================================================
# Sample App 1: Coffee (v1)
# ------------------------------------------------------------
# Simple NGINX-based web app that returns "coffee" responses.
# Used to demonstrate basic ingress routing through the
# BIG-IP → NGINX IC → App pipeline.
#
# Includes: Deployment, Service, and Ingress
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee
  namespace: default
  labels:
    app: coffee
    version: v1
spec:
  replicas: 2                          # Two pods for availability
  selector:
    matchLabels:
      app: coffee
  template:
    metadata:
      labels:
        app: coffee
        version: v1
    spec:
      containers:
        - name: coffee
          image: nginxdemos/nginx-hello:plain-text
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---

# Service exposes the coffee pods inside the cluster
apiVersion: v1
kind: Service
metadata:
  name: coffee-svc
  namespace: default
spec:
  selector:
    app: coffee
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---

# Master Ingress — defines the host for cafe.example.com
# The master has NO paths — paths are defined in minion Ingresses
# (coffee-minion-ingress, tea-ingress, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-master-ingress
  namespace: default
  annotations:
    nginx.org/mergeable-ingress-type: "master"
spec:
  ingressClassName: nginx
  rules:
    - host: cafe.example.com           # Host only — no paths

---

# Minion Ingress for coffee — routes /coffee to coffee-svc
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-ingress
  namespace: default
  annotations:
    nginx.org/mergeable-ingress-type: "minion"
spec:
  ingressClassName: nginx
  rules:
    - host: cafe.example.com
      http:
        paths:
          - path: /coffee
            pathType: Prefix
            backend:
              service:
                name: coffee-svc
                port:
                  number: 80
