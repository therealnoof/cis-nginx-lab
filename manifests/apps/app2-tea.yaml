# ============================================================
# Sample App 2: Tea
# ------------------------------------------------------------
# Second sample app to demonstrate that DevOps can deploy new
# services that go live IMMEDIATELY through the existing
# BIG-IP VIP — no ticket, no BIG-IP change needed.
#
# This is the "aha moment" in the demo: deploy tea, and it's
# reachable through the same VIP within seconds.
#
# Uses its own hostname (tea.example.com) — independent Ingress,
# no coordination with coffee required.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tea
  namespace: default
  labels:
    app: tea
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tea
  template:
    metadata:
      labels:
        app: tea
    spec:
      containers:
        - name: tea
          image: nginxdemos/nginx-hello:plain-text
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---

apiVersion: v1
kind: Service
metadata:
  name: tea-svc
  namespace: default
spec:
  selector:
    app: tea
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---

# Ingress routes tea.example.com → tea-svc
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tea-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: tea.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tea-svc
                port:
                  number: 80
