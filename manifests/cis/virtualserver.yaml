# ============================================================
# CIS VirtualServer CRD — Creates a BIG-IP VIP for NGINX IC
# ------------------------------------------------------------
# This is the "bridge" between NetOps and DevOps:
#
#   - virtualServerAddress: the VIP on BIG-IP that clients hit
#   - pool: points to the NGINX IC ClusterIP service so CIS
#     knows which pods to add as BIG-IP pool members
#   - policyRef: (optional) attach a WAF policy managed by NetOps
#
# When CIS sees this resource, it creates (or updates) a
# Virtual Server on BIG-IP with a pool pointing to the
# NGINX IC service.
#
# *** EDIT virtualServerAddress TO MATCH YOUR BIG-IP VIP ***
# ============================================================

apiVersion: cis.f5.com/v1
kind: VirtualServer
metadata:
  name: nginx-ingress-vs
  namespace: nginx-ingress             # Same namespace as NGINX IC
  labels:
    f5cr: "true"                       # CIS watches for this label
spec:
  # ---------------------------------------------------------
  # VIP address on BIG-IP — this is the external IP clients
  # will hit. Must be routable from the internet/client network.
  # ---------------------------------------------------------
  virtualServerAddress: "10.1.10.100"  # ← Your BIG-IP VIP address

  # ---------------------------------------------------------
  # Ports — CIS creates listeners on BIG-IP for these ports
  # ---------------------------------------------------------
  virtualServerHTTPPort: 80
  virtualServerHTTPSPort: 443

  # ---------------------------------------------------------
  # Pool — points to the NGINX IC ClusterIP service
  # CIS resolves this to the IC pod IPs for the BIG-IP pool
  # ---------------------------------------------------------
  pools:
    - path: /
      service: nginx-ingress-controller
      servicePort: 80
