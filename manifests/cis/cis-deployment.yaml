# ============================================================
# CIS Deployment — F5 BIG-IP Controller for Kubernetes
# ------------------------------------------------------------
# This runs the CIS pod in kube-system. CIS watches the K8s
# API for VirtualServer CRDs and other custom resources, then
# programs BIG-IP accordingly (creates/updates VS, pools, etc.).
#
# Key flags explained:
#   --bigip-url          BIG-IP management IP (https)
#   --bigip-partition    BIG-IP partition CIS manages
#   --pool-member-type   "cluster" means CIS uses pod IPs directly
#                        (requires BIG-IP to have a route to pod network)
#   --custom-resource-mode=true   Use F5 CRDs (not legacy ConfigMaps)
#   --log-level          Set to DEBUG for troubleshooting
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-bigip-ctlr
  namespace: kube-system
  labels:
    app: k8s-bigip-ctlr
spec:
  replicas: 1                          # Single replica is fine for a lab
  selector:
    matchLabels:
      app: k8s-bigip-ctlr
  template:
    metadata:
      labels:
        app: k8s-bigip-ctlr
    spec:
      serviceAccountName: bigip-ctlr   # Must match the RBAC ServiceAccount
      containers:
        - name: k8s-bigip-ctlr
          # ---------------------------------------------------------
          # CIS container image — check F5 docs for latest version:
          # https://clouddocs.f5.com/containers/latest/
          # ---------------------------------------------------------
          image: f5networks/k8s-bigip-ctlr:latest
          env:
            # BIG-IP credentials pulled from the Secret
            - name: BIGIP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bigip-login    # Must match secret name
                  key: username
            - name: BIGIP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigip-login
                  key: password
          command: ["/app/bin/k8s-bigip-ctlr"]
          args:
            # -------------------------------------------------------
            # *** EDIT THESE VALUES FOR YOUR ENVIRONMENT ***
            # -------------------------------------------------------
            - "--bigip-url=https://10.1.1.4"          # ← Your BIG-IP mgmt IP
            - "--bigip-partition=kubernetes"           # ← Partition CIS manages
            - "--pool-member-type=cluster"             # Pod-level routing
            - "--custom-resource-mode=true"            # Use CRDs, not ConfigMaps
            - "--insecure=true"                        # Skip TLS verify (lab only!)
            - "--log-level=INFO"                       # Change to DEBUG if needed
            - "--namespace=nginx-ingress"              # Watch this namespace
            - "--namespace=default"                    # Also watch default
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
