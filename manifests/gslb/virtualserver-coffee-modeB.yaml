# ============================================================
# VirtualServer CRD — Coffee App (Mode B GSLB)
# ------------------------------------------------------------
# CIS in custom-resource-mode only watches CRDs, not standard
# Ingresses. For ExternalDNS to bind a Wide IP to an app, CIS
# needs a VirtualServer CRD whose `host` matches the
# ExternalDNS `domainName`. IngressLink alone doesn't expose
# per-app hostnames to CIS — that's why the standard coffee
# Ingress didn't work for GSLB.
#
# This CRD creates a DEDICATED BIG-IP LTM virtual server for
# coffee.example.com, SEPARATE from the IngressLink VSes:
#
#   IngressLink VSes  → NGINX IC pool  → all apps (unchanged)
#   This VS           → coffee-svc     → coffee pods directly
#
# Clients resolving coffee.example.com via GSLB will hit
# THIS VS (at virtualServerAddress below), bypassing NGINX IC.
# That's acceptable for a GSLB demo — the point is to show
# the Wide IP automation, not the traffic path through NGINX.
#
# *** EDIT virtualServerAddress FOR A FREE VIP ON YOUR BIG-IP ***
# ============================================================

apiVersion: cis.f5.com/v1
kind: VirtualServer
metadata:
  name: coffee-vs
  namespace: default
  labels:
    f5cr: "true"                      # CIS watches resources with this label
spec:
  # BIG-IP partition — must match CIS --bigip-partition arg
  partition: kubernetes

  # FQDN — MUST match the domainName in externaldns-coffee-modeB.yaml
  host: coffee.example.com

  # Dedicated VIP for coffee's GSLB path. Pick a free IP in the
  # BIG-IP's client-facing subnet (NOT the IngressLink VIP).
  virtualServerAddress: "10.1.20.60"   # ← Your free BIG-IP VIP

  # HTTP listener port (no TLS for the lab demo)
  virtualServerHTTPPort: 80

  # Pool definition — CIS creates the BIG-IP pool and populates
  # it with coffee pod IPs via the Flannel VXLAN overlay
  pools:
    - path: /
      service: coffee-svc              # ← matches Service in app1-coffee.yaml
      servicePort: 80                  # ← matches Service port (not containerPort)
      monitor:
        type: http
        send: "GET / HTTP/1.1\r\nHost: coffee.example.com\r\n\r\n"
        recv: ""
        interval: 10
        timeout: 31
