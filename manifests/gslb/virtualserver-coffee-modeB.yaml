# ============================================================
# VirtualServer CRD — Coffee App (Mode B GSLB)
# ------------------------------------------------------------
# CIS in custom-resource-mode only watches CRDs, not standard
# Ingresses. For ExternalDNS to bind a Wide IP to an app, CIS
# needs a VirtualServer CRD whose `host` matches the
# ExternalDNS `domainName` — IngressLink alone doesn't expose
# per-app hostnames to CIS.
#
# This CRD gives GSLB its hostname anchor WITHOUT bypassing
# NGINX IC. The pool points at the NGINX IC Service, so the
# GSLB-resolved VS is just a SECOND BIG-IP entry point into
# the SAME data plane as IngressLink:
#
#   IngressLink VS    : 10.1.20.10:443 → NGINX IC pool → apps
#   This VS (GSLB)    : 10.1.20.60:80  → NGINX IC pool → apps
#
# Traffic hitting either VIP goes through NGINX IC's Ingress
# routing. NGINX IC matches Host: coffee.example.com and
# proxies to coffee-svc internally — same path, different
# front door.
#
# IMPORTANT: assumes proxy-protocol is DISABLED on NGINX IC
# (see nginx-config-proxy-protocol.yaml). If you re-enable
# proxy-protocol for WAF/client-IP demos, this VS will need
# a matching iRule or NGINX IC will reset the connection.
#
# *** EDIT virtualServerAddress FOR A FREE VIP ON YOUR BIG-IP ***
# ============================================================

apiVersion: cis.f5.com/v1
kind: VirtualServer
metadata:
  name: coffee-vs
  namespace: default
  labels:
    f5cr: "true"                      # CIS watches resources with this label
spec:
  # BIG-IP partition — must match CIS --bigip-partition arg
  partition: kubernetes

  # FQDN — MUST match the domainName in externaldns-coffee-modeB.yaml
  host: coffee.example.com

  # Dedicated VIP for coffee's GSLB path. Pick a free IP in the
  # BIG-IP's client-facing subnet (NOT the IngressLink VIP).
  virtualServerAddress: "10.1.20.60"   # ← Your free BIG-IP VIP

  # HTTP listener port (lab demo — for production, add a TLSProfile
  # reference and set virtualServerHTTPSPort to 443 to match the
  # IngressLink VS)
  virtualServerHTTPPort: 80

  # Pool definition — NGINX IC is the pool target. CIS populates
  # the pool with NGINX IC pod IPs via the Flannel VXLAN overlay,
  # same way IngressLink does. NGINX IC then matches the Host
  # header and proxies internally to coffee-svc.
  pools:
    - path: /
      service: nginx-ingress-controller   # NGINX IC Service (verify name: kubectl get svc -n nginx-ingress)
      serviceNamespace: nginx-ingress     # cross-namespace reference — CIS must also watch this namespace
      servicePort: 80                     # NGINX IC HTTP listener (443 would require TLS setup on this VS)
      monitor:
        type: http
        send: "GET / HTTP/1.1\r\nHost: coffee.example.com\r\n\r\n"
        recv: ""                          # empty recv matches any response — NGINX IC returns 404 if coffee Ingress isn't deployed
        interval: 10
        timeout: 31
